<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Админ — Фото агентов</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #333; }
  th { color: #888; font-size: 13px; font-weight: 500; }
  .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #333; }
  .no-photo { width: 50px; height: 50px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #555; }
  .btn { padding: 8px 16px; background: #dcb344; color: #111; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #e8c55a; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .status { font-size: 12px; color: #4f4; margin-left: 8px; }
  .error { color: #f44; }
</style>
</head>
<body>
<h1>Фото AI-агентов</h1>
<table>
  <thead><tr><th>ID</th><th>Имя</th><th>Фото</th><th>Действие</th></tr></thead>
  <tbody id="agentList"><tr><td colspan="4" style="color:#666">Загрузка...</td></tr></tbody>
</table>

<script>
var API = 'https://kosmos-backend-1.onrender.com';

async function loadAgents() {
  var res = await fetch(API + '/api/admin/agents');
  var agents = await res.json();
  var tbody = document.getElementById('agentList');
  tbody.innerHTML = '';
  agents.forEach(function(a) {
    var tr = document.createElement('tr');
    tr.id = 'row-' + a.id;
    var photoHtml = a.photo_url
      ? '<img class="avatar" src="' + a.photo_url + '" id="photo-' + a.id + '">'
      : '<div class="no-photo" id="photo-' + a.id + '">?</div>';
    tr.innerHTML =
      '<td>' + a.id + '</td>' +
      '<td>' + a.name + '</td>' +
      '<td>' + photoHtml + '</td>' +
      '<td><button class="btn" onclick="pickFile(' + a.id + ')">Загрузить фото</button><input type="file" accept="image/*" id="input-' + a.id + '" style="display:none" onchange="uploadPhoto(' + a.id + ',this)"><span id="status-' + a.id + '"></span></td>';
    tbody.appendChild(tr);
  });
}

function pickFile(id) {
  document.getElementById('input-' + id).click();
}

async function uploadPhoto(id, input) {
  var file = input.files[0];
  if (!file) return;
  var status = document.getElementById('status-' + id);
  status.textContent = ' Загрузка...';
  status.className = 'status';
  var formData = new FormData();
  formData.append('agent_id', id);
  formData.append('file', file);
  try {
    var res = await fetch(API + '/api/admin/agent-photo', { method: 'POST', body: formData });
    var data = await res.json();
    if (data.success) {
      var photoEl = document.getElementById('photo-' + id);
      if (photoEl.tagName === 'IMG') {
        photoEl.src = data.url;
      } else {
        photoEl.outerHTML = '<img class="avatar" src="' + data.url + '" id="photo-' + id + '">';
      }
      status.textContent = ' ✓ Готово';
    } else {
      status.textContent = ' ✗ ' + (data.error || 'Ошибка');
      status.className = 'status error';
    }
  } catch(e) {
    status.textContent = ' ✗ ' + e.message;
    status.className = 'status error';
  }
  input.value = '';
}

loadAgents();
</script>
</body>
</html>
